[buildenv]
NODE_VERSION = 18

[build]
base = backend
command = npm install && npm run build || true
functions = backend
publish = frontend/dist

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/dist/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
