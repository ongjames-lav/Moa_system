<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MOA Management System</title>
    <link rel="icon" type="image/x-icon" href="./assets/logo-D2tvUO59.ico" />
    <script type="module" crossorigin src="./assets/index-C6_RY7qY.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Z9tlhFPW.css">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-content">
          <h1>📋 Partnership Management System</h1>
          <p>Memorandum of Agreement (MOA) documents manager</p>
        </div>
        
        <!-- Settings Panel Toggle -->
        <button id="settingsToggleBtn" class="settings-toggle" title="Toggle Settings">
          <span class="gear-icon">⚙️</span>
        </button>
        
        <!-- Collapsible Settings Panel -->
        <div id="settingsPanel" class="settings-panel">
          <!-- Search & Filter -->
          <div class="settings-group">
            <input 
              type="text" 
              id="searchInput" 
              class="search-input" 
              placeholder="Search by company name..."
            />
          </div>
          
          <!-- Sort By -->
          <div class="settings-group">
            <select id="sortBy" class="form-select">
              <option value="uploadDate_DESC">Latest Uploaded</option>
              <option value="uploadDate_ASC">Oldest Uploaded</option>
              <option value="companyName_ASC">Company Name (A-Z)</option>
              <option value="companyName_DESC">Company Name (Z-A)</option>
              <option value="startDate_DESC">Start Date (Newest)</option>
              <option value="startDate_ASC">Start Date (Oldest)</option>
              <option value="endDate_DESC">End Date (Newest)</option>
              <option value="endDate_ASC">End Date (Oldest)</option>
            </select>
          </div>
          
          <!-- View Mode -->
          <div class="settings-group">
            <label class="view-mode-label">View Mode</label>
            <div class="view-mode-buttons">
              <button id="tileViewBtn" class="view-mode-btn active" data-view="tile" title="Tile View">
                🔲 Tiles
              </button>
              <button id="listViewBtn" class="view-mode-btn" data-view="list" title="List View">
                📋 List
              </button>
            </div>
          </div>

          <!-- College Filter -->
          <div class="settings-group">
            <label for="collegeFilter" class="filter-label">COLLEGE:</label>
            <select id="collegeFilter" class="form-select">
              <option value="">-- All Colleges --</option>
              <option value="CCS">CCS - College of Computer Studies</option>
              <option value="CTE">CTE - College of Teacher Education</option>
              <option value="CBA">CBA - College of Business Administration</option>
              <option value="CCJE">CCJE - College of Criminal Justice Education</option>
              <option value="CAS">CAS - College of Arts and Sciences</option>
              <option value="COA">COA - College of Accountancy</option>
              <option value="none">No College Selected</option>
            </select>
          </div>

          <!-- Partner Type Filter -->
          <div class="settings-group">
            <label for="partnerTypeFilter" class="filter-label">PARTNER TYPE:</label>
            <select id="partnerTypeFilter" class="form-select">
              <option value="">-- All Types --</option>
              <option value="Industry Partner">Industry Partner</option>
              <option value="Institutional Partner">Institutional Partner</option>
              <option value="none">No Partner Type Selected</option>
            </select>
          </div>
        </div>
      </header>

      <main class="container">
        <aside class="sidebar">
          <div class="sidebar-section">
            <h3>Actions</h3>
            <button id="uploadBtn" class="btn btn-primary btn-block">
              ➕ Upload MOA
            </button>
            <button id="selectAllBtn" class="btn btn-secondary btn-block" style="display: none;">
              ☑️ Select All
            </button>
            <button id="deleteSelectedBtn" class="btn btn-danger btn-block" style="display: none;">
              🗑️ Delete Selected
            </button>
          </div>

          <div class="sidebar-section">
            <h3>Filter by Status</h3>
            <div class="status-filter-buttons">
              <button id="allStatusBtn" class="status-filter-btn active" data-status="all">
                📋 All MOAs
              </button>
              <button id="activeStatusBtn" class="status-filter-btn" data-status="active">
                ✅ Active
              </button>
              <button id="dueForRenewalBtn" class="status-filter-btn" data-status="dueForRenewal">
                🔄 Due for Renewal
              </button>
              <button id="expiredStatusBtn" class="status-filter-btn" data-status="expired">
                ⏰ Expired
              </button>
            </div>
          </div>

          <div class="sidebar-section">
            <h3>Statistics</h3>
            <div class="stats">
              <div class="stat-item">
                <span id="totalCountLabel" class="stat-label">Total MOAs:</span>
                <span id="totalCount" class="stat-value">0</span>
              </div>
            </div>
          </div>
        </aside>

        <section class="main-content">
          <div id="loadingSpinner" class="loading" style="display: none;">
            Loading MOAs...
          </div>

          <div id="emptyState" class="empty-state">
            <div class="empty-icon">📭</div>
            <h2 id="emptyStateTitle">No MOAs Yet</h2>
            <p id="emptyStateMessage">Start by uploading your first MOA document using the upload button.</p>
          </div>

          <div id="moaList" class="moa-list" style="display: none;"></div>

          <!-- Pagination -->
          <div id="paginationControls" class="pagination-controls" style="display: none;">
            <button id="prevPageBtn" class="btn btn-secondary">← Previous</button>
            <span id="pageInfo" class="page-info">Page 1</span>
            <button id="nextPageBtn" class="btn btn-secondary">Next →</button>
          </div>
        </section>
      </main>

      <!-- Info Card Modal -->
      <div id="infoModal" class="modal" style="display: none;">
        <div class="modal-content info-modal-content">
          <button class="modal-close info-modal-close">&times;</button>
          <div id="infoCardContainer"></div>
        </div>
      </div>

      <!-- Detail Modal -->
      <div id="detailModal" class="modal" style="display: none;">
        <div class="modal-content">
          <div class="modal-header">
            <div class="modal-title-container">
              <h2 id="modalTitle">Edit MOA</h2>
            </div>
            <div class="modal-badges-container"></div>
            <button class="modal-close">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>Company Name:</label>
              <input type="text" id="metadataCompanyName" class="form-input" />
            </div>
            <div class="form-group">
              <label>Start Date:</label>
              <input type="date" id="metadataStartDate" class="form-input" />
            </div>
            <div class="form-group">
              <label>End Date:</label>
              <input type="date" id="metadataEndDate" class="form-input" />
            </div>
            <div class="form-group">
              <label>Notes:</label>
              <textarea id="metadataNotes" class="form-input" rows="3" placeholder="Additional notes..."></textarea>
            </div>
            <div class="form-group">
              <label>College:</label>
              <select id="metadataCollege" class="form-select">
                <option value="">-- None --</option>
                <option value="CCS">CCS - College of Computer Studies</option>
                <option value="CTE">CTE - College of Teacher Education</option>
                <option value="CBA">CBA - College of Business Administration</option>
                <option value="CCJE">CCJE - College of Criminal Justice Education</option>
                <option value="CAS">CAS - College of Arts and Sciences</option>
                <option value="COA">COA - College of Accountancy</option>
              </select>
            </div>
            <div class="form-group">
              <label>Partner Type:</label>
              <select id="metadataPartnerType" class="form-select">
                <option value="">-- None --</option>
                <option value="Industry Partner">Industry Partner</option>
                <option value="Institutional Partner">Institutional Partner</option>
              </select>
            </div>
            <div class="form-group">
              <label>PDF File:</label>
              <span id="metadataPDFName">-</span>
            </div>
            <div class="form-group">
              <label>File Size:</label>
              <span id="metadataFileSize">-</span>
            </div>
            <div class="form-group">
              <label>Upload Date:</label>
              <span id="metadataDate">-</span>
            </div>
          </div>
          <div class="modal-footer">
            <button id="saveMetadataBtn" class="btn btn-primary">Save Changes</button>
            <button id="closeModalBtn" class="btn btn-secondary">Close</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
